<!DOCTYPE html>
<html>
<head>

<title>Snake Nokia Battle</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

</head>

<body>


<div class="game">

<h2>🐍 SNAKE NOKIA</h2>


<div id="info">

SKOR:
<span id="score">0</span>

<br>

WAKTU:
<span id="time">90</span>

<br>

HIGH SCORE:
<span id="high">0</span>

</div>



<canvas id="canvas"
width="400"
height="400">
</canvas>


<h3 id="message"></h3>


<button id="start">
START
</button>



<div class="joystick">

<button id="up">▲</button>

<br>

<button id="left">◀</button>

<button id="down">▼</button>

<button id="right">▶</button>

</div>


<p>
PC: WASD / Arrow
</p>


</div>


<script src="script.js"></script>

</body>
</html>
